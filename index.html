<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>تطابق الصور</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;font-family:Segoe UI,Tahoma,sans-serif;color:#fff;overflow:hidden;height:100dvh;display:flex;flex-direction:column}
.mobile-review{display:flex;flex-direction:column;height:100dvh;width:100%;position:fixed;top:0;left:0;z-index:100;background:#000}
.mr-img-wrap{flex:1;display:flex;align-items:center;justify-content:center;background:#000;overflow:hidden;position:relative}
.mr-img-wrap img{width:100%;height:100%;object-fit:contain}
.mr-tap-left,.mr-tap-right{position:absolute;top:0;bottom:80px;width:40%;z-index:2}
.mr-tap-left{left:0}
.mr-tap-right{right:0}
.mr-top{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:12px 15px;background:linear-gradient(to bottom,rgba(0,0,0,.8),transparent);z-index:3}
.mr-top button{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:1.2em;cursor:pointer;padding:6px 12px;border-radius:20px}
.mr-top .mr-counter{color:#fff;font-size:.8em;background:rgba(0,0,0,.5);padding:4px 10px;border-radius:10px}
.mr-bottom{background:rgba(20,20,35,.97);padding:10px 12px;padding-bottom:max(10px,env(safe-area-inset-bottom,10px));z-index:3}
.mr-bottom select{width:100%;padding:12px;border:2px solid #8e44ad;border-radius:10px;font-size:1em;background:#1a1a2e;color:#fff;-webkit-appearance:none;appearance:none}
.mr-bottom select option{background:#1a1a2e;color:#fff}
.mr-bottom select:disabled{border-color:#555;opacity:.6}
.mr-bottom .mr-class-row{margin-bottom:6px}
.mr-bottom .mr-save-row{display:flex;gap:8px;margin-top:6px}
.mr-bottom .mr-save-row button{flex:1;padding:12px;border:none;border-radius:10px;font-size:1em;cursor:pointer;font-weight:bold}
.mr-bottom .btn-save{background:#27ae60;color:#fff}
.mr-bottom .btn-save:disabled{background:#555;color:#888;cursor:default}
.mr-bottom .btn-nav{background:#555;color:#fff}
.mr-bottom .mr-info{text-align:center;font-size:.75em;color:#888;margin-top:4px}
.desktop-grid{display:none;padding:15px;overflow-y:auto;height:100vh;background:#111}
.dg-top{display:flex;gap:10px;align-items:center;margin-bottom:15px;flex-wrap:wrap}
.dg-top select{padding:8px 12px;border:2px solid #555;border-radius:8px;font-size:.9em;background:#1a1a2e;color:#fff}
.dg-top button{padding:8px 15px;border:none;border-radius:8px;cursor:pointer;font-size:.85em;color:#fff}
.dg-top .btn-open{background:#8e44ad}
.dg-top .btn-export{background:#2980b9}
.dg-top .btn-import{background:#d35400}
.dg-top .stats{color:#aaa;font-size:.85em}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
.photo-card{background:#1a1a2e;border-radius:8px;overflow:hidden}
.photo-card .thumb{width:100%;aspect-ratio:565/800;object-fit:cover;display:block;cursor:pointer}
.photo-card .card-body{padding:6px}
.photo-card .card-body .fn{color:#666;font-size:.65em}
.photo-card .card-body .nm{font-size:.75em;font-weight:bold}
.photo-card.matched .card-body .nm{color:#4CAF50}
.photo-card.unmatched .card-body .nm{color:#e74c3c}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#27ae60;color:#fff;padding:10px 20px;border-radius:8px;display:none;z-index:999;font-size:.9em;text-align:center}
@media(min-width:768px){.mobile-review{display:none!important}.desktop-grid{display:block}}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<div id="teacherModal" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.95);z-index:1000;display:none;align-items:center;justify-content:center;flex-direction:column;padding:20px">
  <div style="background:#1a1a2e;padding:30px;border-radius:14px;text-align:center;width:100%;max-width:350px">
    <h3 style="margin-bottom:8px;font-size:1.3em">👤 اسم المدرس</h3>
    <p style="font-size:.85em;color:#aaa;margin-bottom:18px">أدخل اسمك ليتم حفظ التطابقات باسمك</p>
    <input id="teacherInput" type="text" placeholder="اكتب اسمك الثلاثي" style="width:100%;padding:14px;border:2px solid #8e44ad;border-radius:10px;font-size:1.1em;background:#111;color:#fff;text-align:center;margin-bottom:15px;outline:none" onkeydown="if(event.key==='Enter')setTeacherName()">
    <button onclick="setTeacherName()" style="width:100%;padding:14px;background:#27ae60;color:#fff;border:none;border-radius:10px;font-size:1.1em;cursor:pointer;font-weight:bold">▶ بدء</button>
  </div>
</div>
<div class="mobile-review" id="mobileReview">
  <div class="mr-img-wrap">
    <div class="mr-tap-left" onclick="navMobile(-1)"></div>
    <div class="mr-tap-right" onclick="navMobile(1)"></div>
    <img id="mrImage" src="" alt="">
    <div class="mr-top">
      <button onclick="closeMobileReview()">✕</button>
      <span class="mr-counter" id="mrCounter">1 / 153</span>
      <button onclick="syncToServer()" style="background:rgba(41,128,185,.6);font-size:.9em">☁️ رفع</button>
      <span id="syncStatus" style="font-size:.65em;color:#888;margin:0 5px"></span>
    </div>
  </div>
  <div class="mr-bottom">
    <div class="mr-class-row">
      <select id="mrClass" onchange="onMRClassChange()"><option value="">-- اختر الصف --</option></select>
    </div>
    <select id="mrName" onchange="onMRNameChange()" disabled><option value="">-- اختر الصف أولاً --</option></select>
    <div class="mr-save-row">
      <button class="btn-nav" onclick="navMobile(-1)">←</button>
      <button class="btn-nav" onclick="navMobile(1)">→</button>
    </div>
    <div class="mr-info" id="mrInfo"></div>
  </div>
</div>
<div class="desktop-grid" id="desktopGrid">
  <div class="dg-top">
    <select id="dgClass" onchange="renderGrid()"><option value="">كل الصفوف</option></select>
    <button class="btn-open" onclick="openMobileReview(0)">📱 فتح المعاينة</button>
    <button class="btn-export" onclick="exportMatches()">📥 تصدير</button>
    <button class="btn-import" onclick="document.getElementById('importInput').click()">📤 استيراد</button>
    <button class="btn-sync" onclick="syncToServer()" style="background:#27ae60;color:#fff">☁️ رفع إلى السحابة</button>
    <input type="file" id="importInput" accept=".json" style="display:none" onchange="importMatches(event)">
    <span class="stats" id="dgStats"></span>
  </div>
  <div class="photo-grid" id="photoGrid"></div>
</div>

var PHOTOS = DATA.photoList;
// ضع رابط Google Apps Script هنا بعد نشر الـ Web App
var GAS_URL = "https://script.google.com/macros/s/AKfycbyymp3WgmvcHH5vX2_Juc61BDh1MKehVAPDHZiC1R_N_1E60K_rNjJGRD6Safg0B0DO/exec";

var matches = {};
var mobileIdx = 0;
var teacherName = "";
var syncTimer = null;
var syncStatus = document.getElementById("syncStatus");

function imgURL(hq){return "https://lh3.googleusercontent.com/d/"+DATA.driveFiles[hq]+"=s0"}

function setTeacherName(){var v=document.getElementById("teacherInput").value.trim();if(!v)return;teacherName=v;localStorage.setItem("tm_teacher",teacherName);document.getElementById("teacherModal").style.display="none";toast("👤 مرحباً "+teacherName);loadMatches();renderGrid();if(window.innerWidth<768||("ontouchstart"in window)){setTimeout(function(){if(PHOTOS.length>0)openMobileReview(0)},300)}}
function ensureTeacher(){if(teacherName)return true;teacherName=localStorage.getItem("tm_teacher")||"";if(teacherName)return true;document.getElementById("teacherModal").style.display="flex";return false}
function loadMatches(){try{var s=localStorage.getItem("teacher_matches");if(s)matches=JSON.parse(s)}catch(e){}}
function saveLS(){try{localStorage.setItem("teacher_matches",JSON.stringify(matches))}catch(e){}}
function toast(m){var t=document.getElementById("toast");t.textContent=m;t.style.display="block";setTimeout(function(){t.style.display="none"},2000)}
function getStudentClass(name){if(!name)return null;for(var c in DATA.classes){if(DATA.classes[c].indexOf(name)>=0)return c}return null}
var classList=Object.keys(DATA.classes).sort();
classList.forEach(function(c){["mrClass","dgClass"].forEach(function(id){var o=document.createElement("option");o.value=c;o.textContent=c;document.getElementById(id).appendChild(o)})});
function onMRClassChange(){var cls=document.getElementById("mrClass").value;var sel=document.getElementById("mrName");if(!cls){sel.innerHTML="<option value=\"\">-- اختر الصف أولاً --</option>";sel.disabled=true;return}sel.innerHTML="<option value=\"\">-- اختر اسم الطالب --</option>";DATA.classes[cls].forEach(function(n){var o=document.createElement("option");o.value=n;o.textContent=n;sel.appendChild(o)});sel.disabled=false;var hq=PHOTOS[mobileIdx];var current=matches[hq]||"";if(current&&getStudentClass(current)===cls)sel.value=current}
function autoSync(){if(!ensureTeacher()||!GAS_URL)return;if(syncTimer)clearTimeout(syncTimer);syncTimer=setTimeout(function(){var total=Object.keys(matches).filter(function(k){return matches[k]}).length;if(total===0)return;syncStatus.textContent="☁️";var x=new XMLHttpRequest();x.open("POST",GAS_URL,true);x.setRequestHeader("Content-Type","application/json");x.onload=function(){try{var r=JSON.parse(x.responseText);syncStatus.textContent=r.status==="ok"?"☁️✅":"☁️❌";setTimeout(function(){syncStatus.textContent=""},3000)}catch(e){syncStatus.textContent="☁️❌";setTimeout(function(){syncStatus.textContent=""},3000)}};x.onerror=function(){syncStatus.textContent="☁️❌";setTimeout(function(){syncStatus.textContent=""},3000)};x.send(JSON.stringify({teacher:teacherName,matches:matches}))},2000)}
function onMRNameChange(){var hq=PHOTOS[mobileIdx];var val=document.getElementById("mrName").value;if(val){matches[hq]=val}else{delete matches[hq]}saveLS();autoSync()}
function updateMobileReview(){if(PHOTOS.length===0)return;if(mobileIdx<0)mobileIdx=0;if(mobileIdx>=PHOTOS.length)mobileIdx=PHOTOS.length-1;var hq=PHOTOS[mobileIdx];var existing=matches[hq]||"";var existingCls=getStudentClass(existing);var url=imgURL(hq);document.getElementById("mrImage").src=url;document.getElementById("mrCounter").textContent=(mobileIdx+1)+" / "+PHOTOS.length;var mrClass=document.getElementById("mrClass");var mrName=document.getElementById("mrName");if(existingCls){mrClass.value=existingCls;onMRClassChange();mrName.value=existing}else{mrClass.value="";onMRClassChange()}var total=Object.keys(matches).filter(function(k){return matches[k]}).length;document.getElementById("mrInfo").textContent=(existing?"✅ "+existing:"⚠️ بدون اسم")+" | تم "+total+"/"+PHOTOS.length}

function navMobile(d){var ni=mobileIdx+d;if(ni>=0&&ni<PHOTOS.length){mobileIdx=ni;updateMobileReview()}}
function openMobileReview(idx){mobileIdx=idx||0;updateMobileReview();document.getElementById("mobileReview").style.display="flex"}
function closeMobileReview(){document.getElementById("mobileReview").style.display="none"}
function renderGrid(){var filter=document.getElementById("dgClass").value;var grid=document.getElementById("photoGrid");var html="";var count=0;PHOTOS.forEach(function(hq,idx){var existing=matches[hq]||"";if(filter&&getStudentClass(existing)!==filter)return;count++;var url=imgURL(hq);html+="<div class=\"photo-card "+(existing?"matched":"unmatched")+"\"><img class=\"thumb\" src=\""+url+"\" onclick=\"openMobileReview("+idx+")\"><div class=\"card-body\"><div class=\"fn\">"+hq+"</div><div class=\"nm\">"+(existing||"⚠️ بدون اسم")+"</div></div></div>"});grid.innerHTML=html;document.getElementById("dgStats").textContent=count+" صورة"}
document.addEventListener("keydown",function(e){if(document.getElementById("mobileReview").style.display==="flex"){if(e.key==="Escape")closeMobileReview();if(e.key==="ArrowRight")navMobile(1);if(e.key==="ArrowLeft")navMobile(-1)}})
function exportMatches(){var blob=new Blob([JSON.stringify(matches,null,2)],{type:"application/json"});var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="matches.json";a.click();toast("📥 تم التصدير")}
function importMatches(e){var file=e.target.files[0];if(!file)return;var reader=new FileReader();reader.onload=function(ev){try{var data=JSON.parse(ev.target.result);matches=data;saveLS();renderGrid();if(document.getElementById("mobileReview").style.display==="flex")updateMobileReview();toast("📤 تم الاستيراد")}catch(err){toast("❌ خطأ في الملف")}};reader.readAsText(file);e.target.value=""}
function syncToServer(){if(!ensureTeacher())return;if(!GAS_URL){toast("❌ لم يتم تعيين رابط التخزين السحابي");return}var total=Object.keys(matches).filter(function(k){return matches[k]}).length;if(total===0){toast("⚠️ لا توجد تطابقات للرفع");return}syncStatus.textContent="☁️🔄";var x=new XMLHttpRequest();x.open("POST",GAS_URL,true);x.setRequestHeader("Content-Type","application/json");x.onload=function(){try{var r=JSON.parse(x.responseText);if(r.status==="ok"){syncStatus.textContent="☁️✅";toast("✅ تم رفع "+r.count+" تطابق")}else{syncStatus.textContent="☁️❌";toast("❌ "+r.message)}}catch(e){syncStatus.textContent="☁️❌";toast("❌ خطأ في الاستجابة")}};x.onerror=function(){syncStatus.textContent="☁️❌";toast("❌ فشل الاتصال")};x.send(JSON.stringify({teacher:teacherName,matches:matches}));setTimeout(function(){syncStatus.textContent=""},4000)}
loadMatches();
renderGrid();
if(ensureTeacher()&&(window.innerWidth<768||("ontouchstart"in window))){setTimeout(function(){if(PHOTOS.length>0)openMobileReview(0)},100)}
</script>
